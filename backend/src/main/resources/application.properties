spring.application.name=JADE

#--- CONFIG NEON DB ---
#Copiar o 'Host' do Neon (ep-xyz.aws.neon.tech). Manter o ?sslmode=require no final da URL para o Neon aceitar
#Variaveis de ambiente para o que e sensivel
#O Spring Boot entende a sintaxe ${NOME_DA_VARIAVEL} nativamente

#1. URL LIMPA (so o endereco e config de SSL)
#Se o IntelliJ injetar a DB_URL do Neon, ele usa ela.
#Se nao achar nada (caso do tester), ele conecta no Docker local.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/jade_local_db}

#2. Credenciais SEPARADAS
#Tenta a variavel do Neon. Se nao achar, usa o usuario de teste do Docker.
spring.datasource.username=${DB_USERNAME:tester_jade}
#Tenta a senha do Neon. Se nao achar, usa a senha de teste do Docker.
spring.datasource.password=${DB_PASSWORD:tester_password}

#--- CONFIG DRIVER ---
spring.datasource.driver-class-name=org.postgresql.Driver

#--- CONFIG JPA ---
spring.jpa.database=POSTGRESQL
#DIFF: desativei pq o console tava ficando muito cheio. Risos.
spring.jpa.show-sql=false

#Criadas as tabelas manualmente no Neon, usamos 'validate' ou 'none'
#para o Java nao tentar criar tabelas por cima e dar erro
spring.jpa.hibernate.ddl-auto=validate

#--- FLYWAY (IMPORTANTE) ---
#Flyway ligado
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

#Garante que o Logger do Hibernate fique quieto (apenas erros)
#Comentar isso aqui se precisar debugar algo muito cabeludo. Nao sei. Time will tell
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR

#Esconder stack trace
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

#Liga/Desliga o monitoramento do MonitorScheduler (true para rodar, false para pausar)
#Auxiliar para testes de validacao dos Controllers e RBAC no Postman, evitando sujeira no terminal da IDE
jade.scheduler.enabled=true
